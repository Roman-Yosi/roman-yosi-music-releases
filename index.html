<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Roman Yosi Official Music Releases</title>
  <meta name="description" content="Official music release catalog of Roman Yosi. Discography, singles, ISRC, UPC, and streaming links.">

  <!-- SEO Open Graph -->
  <meta property="og:title" content="Roman Yosi Music Releases">
  <meta property="og:description" content="Official release catalog and discography of Roman Yosi (Indie Pop Artist from Indonesia).">
  <meta property="og:type" content="website">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #1c1c1c;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .search {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: none;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #2a2a2a;
    }

    .card:hover {
      background: #2a2a2a;
    }

    .tag {
      font-size: 12px;
      color: #aaa;
    }

    .btn {
      background: #333;
      color: white;
      border: none;
      padding: 8px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #555;
    }

    a {
      color: #4da3ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Roman Yosi Music Releases</h1>
  <p class="tag">Official Discography Database</p>
</header>

<div class="container">

  <input class="search" id="search" placeholder="Search release..." onkeyup="render()">

  <div id="app"></div>

</div>

<script>
const releases = [
  {
    title: "Merenung Hari",
    date: "2026-06-07",
    genre: "Pop",
    isrc: "IDB772122770",
    upc: "8990009194188",
    label: "Roman Yosi Music"
  },
  {
    title: "Keindahan Kota Rangkasbitung",
    date: "2026-06-06",
    genre: "Pop / Indonesian Pop",
    upc: "5063964472592"
  },
  {
    title: "Rindu Tetap Sama",
    date: "2026-06-05",
    genre: "Pop / Indonesian Pop",
    upc: "5063964472554"
  },
  {
    title: "Jejak Di Dada",
    date: "2026-06-04",
    genre: "Pop / Indonesian Pop",
    upc: "5063964489545"
  },
  {
    title: "Suara Dalam Otak",
    date: "2026-06-04",
    genre: "Pop / Indonesian Pop",
    upc: "5063964472424"
  },
  {
    title: "Setengah Cerita",
    date: "2026-06-02",
    genre: "Pop / Indonesian Pop",
    upc: "5063964489293"
  }
];

function render() {
  const q = document.getElementById("search").value.toLowerCase();

  let html = releases
    .filter(r => r.title.toLowerCase().includes(q))
    .map(r => `
      <div class="card">
        <h3>${r.title}</h3>
        <p class="tag">Release Date: ${r.date}</p>
        <p class="tag">Genre: ${r.genre || "-"}</p>
        <p class="tag">ISRC: ${r.isrc || "-"}</p>
        <p class="tag">UPC: ${r.upc || "-"}</p>
        <p class="tag">Label: ${r.label || "Roman Yosi Music"}</p>
      </div>
    `).join("");

  document.getElementById("app").innerHTML = html;
}

render();
</script>

</body>
</html>
